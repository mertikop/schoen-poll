<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Schoen Poll - Clicker</title>
    
    <!-- These are just for the favicon. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/schoen-poll/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/schoen-poll/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/schoen-poll/favicon-16x16.png">
    <link rel="manifest" href="/schoen-poll/site.webmanifest">

    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        
        /* Semantic Status Message Styling */
        #statusMessage { 
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            margin-top: 20px;
            font-size: 0.95rem;
            transition: all 0.2s ease-in-out;
        }
        .status-info { background-color: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
        .status-success { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .status-warning { background-color: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
        .status-error { background-color: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .hidden { display: none !important; }

        .options-container { display: flex; flex-direction: column; gap: 15px; }
        button.option-btn {
            padding: 15px 20px; font-size: 1.2em; cursor: pointer;
            border: 2px solid #4285F4; border-radius: 8px;
            background: white; color: #4285F4; transition: all 0.2s;
            transition: transform 0.1s;
        }
        button.option-btn:active { transform: scale(0.96); }
        button.option-btn:hover { background: #f0f4ff; }
        button.option-btn.selected { background: #4285F4; color: white; }
        button.option-btn:disabled { border-color: #ccc; color: #999; cursor: not-allowed; background: #f9f9f9; }
        button.option-btn.selected:disabled { background: #a0c1ff; border-color: #a0c1ff; color: white; }
    </style>
</head>
<body>

    <h2>Schoen Poll</h2>
    <div id="optionsContainer" class="options-container"></div>
    <div id="statusMessage" class="status-info">Connecting...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        import { firebaseConfig } from "./config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusMessage = document.getElementById('statusMessage');
        const optionsContainer = document.getElementById('optionsContainer');
        
        let currentUser = null;
        let activeQuestionId = null;
        let currentSelection = null;

        let clicksRemaining = 6; // Feeling facetious?

        function showStatus(message, type = 'info', autoHide = false) {
            if (!statusMessage) return;
            
            // Remove old classes
            statusMessage.classList.remove('status-info', 'status-success', 'status-warning', 'status-error', 'hidden');
            
            if (!message) {
                statusMessage.classList.add('hidden');
                return;
            }

            // Apply new classes and HTML
            statusMessage.classList.add(`status-${type}`);
            statusMessage.innerHTML = message;

            if (autoHide) {
                setTimeout(() => {
                    statusMessage.classList.add('hidden');
                    statusMessage.innerHTML = "";
                }, 3000);
            }
        }

        // 1. Make sure the user is logged in somehow
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // If a user is already logged in, just use that session
                console.log("Session detected: ", user.isAnonymous ? "Anonymous" : "Authenticated");
                currentUser = user;
                startListeningToLiveState();
            } else {
                // No session found? Then sign in anonymously
                console.log("No session found. Signing in anonymously...");
                
                // Enforce maximum persistence of the new anonymous session (it is so by default, but let's be explicit)
                setPersistence(auth, browserLocalPersistence)
                    .then(() => {
                        return signInAnonymously(auth);
                    })
                    .catch((error) => {
                        console.error("Auth Error:", error.code, error.message);
                        if (error.code === 'auth/quota-exceeded' || error.code === 'auth/too-many-requests') {
                            showStatus(`
                                <strong>⚠️ Action needed</strong><br>
                                Too many new users are connecting from the same Wi-Fi.<br><br>
                                <strong>To fix this:</strong>
                                <ol style="text-align: left; margin-bottom: 0; padding-left: 20px;">
                                    <li>Turn <strong>OFF</strong> Wi-Fi.</li>
                                    <li>Refresh page using <strong>Cellular Data</strong>.</li>
                                    <li>Turn Wi-Fi back on.</li>
                                </ol>
                            `, 'warning');
                        } else {
                            showStatus("Connection error. Please try refreshing the page.", "error");
                        }
                    });
            }
        });

        // 2. Listen to the live state
        function startListeningToLiveState() {
            const liveStateRef = doc(db, "state", "live");
            
            onSnapshot(liveStateRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    handleStateChange(data);
                }
            });
        }

        // 3. Update UI based on what the Admin is doing
        function handleStateChange(data) {
            let isNewQuestionLoad = false;
            
            // Check if the question ID from Firebase is different from our local memory
            if (data.active_question_id !== activeQuestionId) {
                activeQuestionId = data.active_question_id;
                currentSelection = null;
                isNewQuestionLoad = true; 

                const savedId = localStorage.getItem('active_poll_id');
                if (savedId === activeQuestionId) {
                    // Same question as before refresh, load the saved clicks
                    clicksRemaining = parseInt(localStorage.getItem('active_poll_clicks')) || 0;
                } else {
                    // Brand new question or first time seeing this ID
                    clicksRemaining = 6;
                    localStorage.setItem('active_poll_id', activeQuestionId);
                    localStorage.setItem('active_poll_clicks', clicksRemaining);
                }
            }

            optionsContainer.innerHTML = ''; 

            // If the poll is completely finished, clear the options and show waiting text
            if (data.status === "complete") {
                showStatus("Waiting for the next question to launch...", "info");
                return; // Stop executing, which leaves the optionsContainer empty
            }

            // Otherwise, handle open/closed
            if (data.status === "open") {
                showStatus("Select your answer.", "info");
                updateStatusUI(); 
            } else if (data.status === "closed") {
                showStatus("This question is closed.", "info");
            }

            data.options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optionText;
                
                if (data.status === "closed") {
                    btn.disabled = true;
                } else {
                    btn.onclick = () => submitAnswer(optionText, btn);
                }

                if (currentSelection === optionText) btn.classList.add('selected');
                optionsContainer.appendChild(btn);
            });

            if (isNewQuestionLoad) {
                restorePreviousAnswer(activeQuestionId);
            }
        }

        // 4. Send the vote (or delete it)
        async function submitAnswer(selectedOption, clickedButton) {
            if (!currentUser || !activeQuestionId) return;

            // Block ANY click (selecting or unselecting) if they are out of clicks
            if (clicksRemaining <= 0) {
                showStatus("No more changes allowed for this question.", "error");
                return;
            }

            const answerRef = doc(db, "questions", activeQuestionId, "answers", currentUser.uid);

            try {
                if (currentSelection === selectedOption) {
                    // Unchecking an answer
                    currentSelection = null;
                    clickedButton.classList.remove('selected');
                    await deleteDoc(answerRef);
                } else {
                    // Selecting/Changing an answer
                    currentSelection = selectedOption;
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    clickedButton.classList.add('selected');
                    await setDoc(answerRef, { choice: selectedOption, timestamp: serverTimestamp() });
                }
                showStatus("", "success");

                // Any successful action (checking or unchecking) now costs a click
                clicksRemaining--;
                localStorage.setItem('active_poll_clicks', clicksRemaining);

                updateStatusUI();

            } catch (error) {
                console.error("Error:", error);
                showStatus("Connection error. Please tap again.", "error");
            }
        }

        function updateStatusUI() {
            if (clicksRemaining > 0) {
                if (clicksRemaining <= 3) {
                    const timesText = clicksRemaining === 1 ? "time" : "times";
                    showStatus(`You can change your answer ${clicksRemaining} more ${timesText}.`, "info");
                }
            } else {
                showStatus("Final answer locked in.", "info");
            }
        }

        // 5. Check if the user already answered this question
        async function restorePreviousAnswer(questionId) {
            if (!currentUser || !questionId) return;

            try {
                const answerRef = doc(db, "questions", questionId, "answers", currentUser.uid);
                const docSnap = await getDoc(answerRef);

                // If they have an answer on record, and the question hasn't changed while loading:
                if (docSnap.exists() && activeQuestionId === questionId) {
                    currentSelection = docSnap.data().choice;

                    // Find the matching button and add the 'selected' class
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        if (btn.innerText === currentSelection) {
                            btn.classList.add('selected');
                        }
                    });
                }
            } catch (error) {
                console.error("Error fetching previous answer:", error);
            }
        }

        // 6. Wake up instantly when the phone screen turns back on
        document.addEventListener("visibilitychange", async () => {
            if (document.visibilityState === 'visible' && currentUser) {
                // The tab is active again. The Firestore websocket might be asleep. 
                // Force a manual HTTP fetch right now to get the UI in sync instantly.
                try {
                    const docSnap = await getDoc(doc(db, "state", "live"));
                    if (docSnap.exists()) {
                        handleStateChange(docSnap.data());
                    }
                } catch (error) {
                    console.error("Error waking up connection:", error);
                }
            }
        });
    </script>
</body>
</html>
